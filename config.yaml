# Melnor ESP configuration.
#
# Baked into the firmware at build time (via include_str!) and parsed once at
# boot. Edit this file and re-run ./flash.sh to apply. The ESP chip/target is
# NOT here — it's a build-target choice passed to flash.sh (e.g. ./flash.sh esp32c3).

# Name exposed to clients on characteristic 0xEC01 (the library's device user
# name UUID). The Melnor app is the most likely reader of this.
device_name: Melnor ESP

# Number of watering zones: 1, 2, or 4. Maps to a real Melnor SKU:
#   1 -> 93015, 2 -> 93100, 4 -> 93280.
valves: 4

drive:
  # "ac" | "latching" | "" to infer from which pins are set below.
  mode: ""
  # Latching only: pulse width in ms (meant to be brief, < 100 ms).
  pulse_ms: 80
  # AC only: true if the relay board energizes on a LOW output.
  active_low: false

  # AC valves: one GPIO per valve, in valve order. Drives a relay whose NO
  # contact feeds 24VAC to the valve.
  pins: []            # e.g. [4, 5, 6, 7]

  # DC latching solenoids: open/close GPIO per valve, in valve order. A brief
  # pulse on the open pin latches the valve on; a pulse on close latches it off.
  open_pins: []       # e.g. [4, 6, 8, 10]
  close_pins: []      # e.g. [5, 7, 9, 11]

battery:
  # "fixed" today. Analog-input sensing and RS-232/485 reporting are planned;
  # this section is where their pins/params will live.
  mode: fixed
  # Percent reported to clients. 100 keeps clients from warning about a low timer.
  level: 100
